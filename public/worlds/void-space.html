<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1920" />
<title>Void Space</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #050510; }
  canvas { display: block; }
  #container {
    width: 1920px;
    height: 1080px;
    transform-origin: top left;
    position: absolute;
    top: 0; left: 0;
  }
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.183.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.183.0/examples/jsm/",
    "gsap": "https://cdn.jsdelivr.net/npm/gsap@3.12.7/+esm"
  }
}
</script>
</head>
<body>
<div id="container"></div>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { RectAreaLightHelper } from 'three/addons/helpers/RectAreaLightHelper.js';
import { RectAreaLightUniformsLib } from 'three/addons/lights/RectAreaLightUniformsLib.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import gsap from 'gsap';

// ---------------------------------------------------------------------------
// Configuration
// ---------------------------------------------------------------------------
const config = window.__worldConfig || {};
const spaceLayout = config.spaceLayout || 'arc';
const cameraPath = config.cameraPath || null;
const configObjects = config.objects || [];
const configPanels = config.panels || [];
const configAvatars = config.avatars || [];

const WIDTH = 1920;
const HEIGHT = 1080;

// ---------------------------------------------------------------------------
// Scale-to-fit
// ---------------------------------------------------------------------------
const container = document.getElementById('container');
function scaleToFit() {
  const sx = window.innerWidth / WIDTH;
  const sy = window.innerHeight / HEIGHT;
  const s = Math.min(sx, sy);
  container.style.transform = `scale(${s})`;
}
scaleToFit();
window.addEventListener('resize', scaleToFit);

// ---------------------------------------------------------------------------
// Scene, Camera, Renderer
// ---------------------------------------------------------------------------
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050510);

const camera = new THREE.PerspectiveCamera(60, WIDTH / HEIGHT, 0.1, 1000);
camera.position.set(0, 1, 8);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(WIDTH, HEIGHT);
renderer.setPixelRatio(1);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
container.appendChild(renderer.domElement);

// ---------------------------------------------------------------------------
// Post-processing — Bloom
// ---------------------------------------------------------------------------
const composer = new EffectComposer(renderer);
const renderPass = new RenderPass(scene, camera);
composer.addPass(renderPass);

const bloomPass = new UnrealBloomPass(
  new THREE.Vector2(WIDTH, HEIGHT),
  0.6,   // strength
  0.4,   // radius
  0.3    // threshold
);
composer.addPass(bloomPass);

// ---------------------------------------------------------------------------
// Lighting
// ---------------------------------------------------------------------------
const ambientLight = new THREE.AmbientLight(0x404060, 0.4);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5, 10, 7);
scene.add(dirLight);

RectAreaLightUniformsLib.init();
const rectLight = new THREE.RectAreaLight(0x4466ff, 2, 10, 10);
rectLight.position.set(0, 2, -5);
rectLight.lookAt(0, 0, 0);
scene.add(rectLight);

// ---------------------------------------------------------------------------
// Star Field
// ---------------------------------------------------------------------------
const starCount = 3000;
const starGeo = new THREE.BufferGeometry();
const starPositions = new Float32Array(starCount * 3);
for (let i = 0; i < starCount; i++) {
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.acos(2 * Math.random() - 1);
  const r = 50 + Math.random() * 150; // radius 50-200
  starPositions[i * 3]     = r * Math.sin(phi) * Math.cos(theta);
  starPositions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
  starPositions[i * 3 + 2] = r * Math.cos(phi);
}
starGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));

const starMat = new THREE.PointsMaterial({
  color: 0xffffff,
  size: 0.3,
  sizeAttenuation: true,
  transparent: true,
  opacity: 0.9,
});
const stars = new THREE.Points(starGeo, starMat);
scene.add(stars);

// ---------------------------------------------------------------------------
// Animation Mixers
// ---------------------------------------------------------------------------
const mixers = [];
const clock = new THREE.Clock();

// ---------------------------------------------------------------------------
// GSAP Timeline
// ---------------------------------------------------------------------------
const tl = gsap.timeline({ paused: true });
window.__tl = tl;

// ---------------------------------------------------------------------------
// Panel Layout Algorithms
// ---------------------------------------------------------------------------
let panelIndex = 0;

function layoutPosition(index, total) {
  const layout = spaceLayout;
  if (layout === 'grid') {
    const cols = 3;
    const spacingX = 3.5;
    const spacingY = 2.5;
    const col = index % cols;
    const row = Math.floor(index / cols);
    const offsetX = -(cols - 1) * spacingX / 2;
    return new THREE.Vector3(
      offsetX + col * spacingX,
      2 - row * spacingY,
      -4
    );
  }
  if (layout === 'spiral') {
    const angle = index * 0.8;
    const r = 4 + index * 0.3;
    const y = 1 + index * 1.2;
    return new THREE.Vector3(
      Math.cos(angle) * r,
      y,
      Math.sin(angle) * r - 5
    );
  }
  if (layout === 'random') {
    return new THREE.Vector3(
      (Math.random() - 0.5) * 10,
      Math.random() * 4 + 0.5,
      -3 - Math.random() * 6
    );
  }
  // 'arc' or default — semicircular arc
  const arcAngle = Math.PI * 0.6;
  const arcRadius = 6;
  const step = total > 1 ? arcAngle / (total - 1) : 0;
  const a = -arcAngle / 2 + step * index;
  return new THREE.Vector3(
    Math.sin(a) * arcRadius,
    1.5,
    -Math.cos(a) * arcRadius
  );
}

// ---------------------------------------------------------------------------
// Panel Creation
// ---------------------------------------------------------------------------
const panelObjects = [];

function addPanel(html, position, rotation, widthM = 2.5, heightM = 1.5) {
  const pxW = 800;
  const pxH = Math.round(pxW * (heightM / widthM));

  // Render HTML to canvas via foreignObject SVG
  const svgStr = `
    <svg xmlns="http://www.w3.org/2000/svg" width="${pxW}" height="${pxH}">
      <foreignObject width="100%" height="100%">
        <div xmlns="http://www.w3.org/1999/xhtml"
             style="width:${pxW}px;height:${pxH}px;color:#fff;font-family:system-ui,sans-serif;font-size:24px;padding:24px;box-sizing:border-box;">
          ${html}
        </div>
      </foreignObject>
    </svg>`;

  const img = new Image();
  const blob = new Blob([svgStr], { type: 'image/svg+xml;charset=utf-8' });
  const url = URL.createObjectURL(blob);

  img.onload = () => {
    const canvas = document.createElement('canvas');
    canvas.width = pxW;
    canvas.height = pxH;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0);
    URL.revokeObjectURL(url);

    const texture = new THREE.CanvasTexture(canvas);
    texture.needsUpdate = true;

    // Panel face
    const geo = new THREE.PlaneGeometry(widthM, heightM);
    const mat = new THREE.MeshStandardMaterial({
      map: texture,
      transparent: true,
      roughness: 0.4,
      metalness: 0.1,
    });
    const mesh = new THREE.Mesh(geo, mat);

    // Glowing edge frame
    const frameThickness = 0.02;
    const frameDepth = 0.04;
    const frameMat = new THREE.MeshStandardMaterial({
      color: 0x4488ff,
      emissive: 0x2244aa,
      emissiveIntensity: 1.5,
      roughness: 0.3,
      metalness: 0.6,
    });

    const frameGroup = new THREE.Group();
    // Top
    const topBar = new THREE.Mesh(
      new THREE.BoxGeometry(widthM + frameThickness * 2, frameThickness, frameDepth),
      frameMat
    );
    topBar.position.set(0, heightM / 2, 0);
    frameGroup.add(topBar);
    // Bottom
    const bottomBar = topBar.clone();
    bottomBar.position.set(0, -heightM / 2, 0);
    frameGroup.add(bottomBar);
    // Left
    const leftBar = new THREE.Mesh(
      new THREE.BoxGeometry(frameThickness, heightM, frameDepth),
      frameMat
    );
    leftBar.position.set(-widthM / 2, 0, 0);
    frameGroup.add(leftBar);
    // Right
    const rightBar = leftBar.clone();
    rightBar.position.set(widthM / 2, 0, 0);
    frameGroup.add(rightBar);

    const panelGroup = new THREE.Group();
    panelGroup.add(mesh);
    panelGroup.add(frameGroup);

    // Position
    let posVec;
    if (!position) {
      posVec = layoutPosition(panelIndex, Math.max(configPanels.length, panelIndex + 1));
    } else if (position instanceof THREE.Vector3) {
      posVec = position.clone();
    } else if (Array.isArray(position)) {
      posVec = new THREE.Vector3(position[0] || 0, position[1] || 0, position[2] || 0);
    } else {
      posVec = new THREE.Vector3(position.x || 0, position.y || 0, position.z || 0);
    }
    panelGroup.position.copy(posVec);

    if (rotation) {
      if (Array.isArray(rotation)) {
        panelGroup.rotation.set(rotation[0] || 0, rotation[1] || 0, rotation[2] || 0);
      } else {
        panelGroup.rotation.set(rotation.x || 0, rotation.y || 0, rotation.z || 0);
      }
    } else {
      panelGroup.lookAt(camera.position);
    }

    scene.add(panelGroup);
    panelObjects.push(panelGroup);
    panelIndex++;
  };
  img.src = url;
}

window.__addPanel = addPanel;

// ---------------------------------------------------------------------------
// Asset Loading (GLTF)
// ---------------------------------------------------------------------------
const gltfLoader = new GLTFLoader();
const loadedObjects = [];

function voidSetPosition(model, position) {
  if (!position) return;
  if (Array.isArray(position)) model.position.set(position[0] || 0, position[1] || 0, position[2] || 0);
  else model.position.set(position.x || 0, position.y || 0, position.z || 0);
}

function voidSetRotation(model, rotation) {
  if (!rotation) return;
  if (Array.isArray(rotation)) model.rotation.set(rotation[0] || 0, rotation[1] || 0, rotation[2] || 0);
  else model.rotation.set(rotation.x || 0, rotation.y || 0, rotation.z || 0);
}

function addVoidPlaceholder(assetId, position, rotation, scale) {
  const g = new THREE.BoxGeometry(0.65, 0.65, 0.65);
  const m = new THREE.MeshStandardMaterial({ color: 0x5577aa, metalness: 0.25, roughness: 0.55 });
  const mesh = new THREE.Mesh(g, m);
  mesh.name = `placeholder:${assetId}`;
  voidSetPosition(mesh, position);
  voidSetRotation(mesh, rotation);
  if (scale) mesh.scale.setScalar(typeof scale === 'number' ? scale : 1);
  scene.add(mesh);
  loadedObjects.push({ id: assetId, model: mesh, gltf: null });
  return mesh;
}

async function loadAsset(assetId, position, rotation, scale, animations) {
  try {
    const indexResp = await fetch('/models/library/index.json');
    const indexRoot = await indexResp.json();
    const models = Array.isArray(indexRoot.models) ? indexRoot.models : [];
    const entry = models.find(e => e.id === assetId);
    if (!entry) { console.warn(`Asset not found: ${assetId}`); return null; }

    return new Promise((resolve) => {
      gltfLoader.load(
        `/models/library/${entry.file}`,
        (gltf) => {
          const model = gltf.scene;
          voidSetPosition(model, position);
          voidSetRotation(model, rotation);
          if (scale) {
            const s = typeof scale === 'number' ? scale : 1;
            model.scale.setScalar(s);
          }
          scene.add(model);

          if (gltf.animations && gltf.animations.length > 0) {
            const mixer = new THREE.AnimationMixer(model);
            const anims = animations || gltf.animations.map(a => a.name);
            anims.forEach(name => {
              const clip = gltf.animations.find(a => a.name === name);
              if (clip) mixer.clipAction(clip).play();
            });
            mixers.push(mixer);
          }

          loadedObjects.push({ id: assetId, model, gltf });
          resolve(model);
        },
        undefined,
        (err) => {
          console.warn(`Failed to load asset ${assetId}:`, err);
          resolve(addVoidPlaceholder(assetId, position, rotation, scale));
        }
      );
    });
  } catch (e) {
    console.warn(`Asset loading error for ${assetId}:`, e);
    return null;
  }
}

// ---------------------------------------------------------------------------
// Camera Path
// ---------------------------------------------------------------------------
const defaultCamStart = camera.position.clone();

function camVec3Void(p, def = [0, 0, 0]) {
  if (p == null) return new THREE.Vector3(def[0], def[1], def[2]);
  if (Array.isArray(p)) return new THREE.Vector3(p[0] ?? def[0], p[1] ?? def[1], p[2] ?? def[2]);
  return new THREE.Vector3(p.x ?? def[0], p.y ?? def[1], p.z ?? def[2]);
}

function normalizeVoidCameraKeyframes(raw) {
  return raw
    .map((k) => {
      const time = k.time !== undefined ? k.time : (k.t !== undefined ? k.t : 0);
      const posSrc = k.position !== undefined ? k.position : k.pos;
      const pos = camVec3Void(posSrc, [0, 1, 8]);
      let look = k.lookAt != null ? camVec3Void(k.lookAt, [pos.x, pos.y, pos.z - 3]) : null;
      return { time, position: pos, lookAt: look };
    })
    .sort((a, b) => a.time - b.time);
}

function applyCameraPath(t) {
  if (cameraPath && cameraPath.length >= 2) {
    const sorted = normalizeVoidCameraKeyframes(cameraPath);
    const t0 = sorted[0].time;
    const t1 = sorted[sorted.length - 1].time;
    const ct = Math.max(t0, Math.min(t, t1));

    let i = 0;
    while (i < sorted.length - 1 && sorted[i + 1].time <= ct) i++;
    const kA = sorted[i];
    const kB = sorted[Math.min(i + 1, sorted.length - 1)];
    const segDur = kB.time - kA.time;
    const frac = segDur > 0 ? (ct - kA.time) / segDur : 0;

    camera.position.lerpVectors(kA.position, kB.position, frac);

    const laA = kA.lookAt || kA.position.clone().add(new THREE.Vector3(0, 0, -3));
    const laB = kB.lookAt || kB.position.clone().add(new THREE.Vector3(0, 0, -3));
    const la = new THREE.Vector3().lerpVectors(laA, laB, frac);
    camera.lookAt(la);
  } else {
    camera.position.z = defaultCamStart.z - t * 0.3;
  }
}

// ---------------------------------------------------------------------------
// Uniform updates
// ---------------------------------------------------------------------------
let sceneTime = 0;
window.__sceneTime = 0;

function updateUniforms(t) {
  sceneTime = t;
  window.__sceneTime = t;
  // Rotate star field slowly
  stars.rotation.y = t * 0.01;
  stars.rotation.x = t * 0.005;
}

// ---------------------------------------------------------------------------
// WVC Bridge
// ---------------------------------------------------------------------------
window.__sceneReady = new Promise(resolve => { window.__resolveReady = resolve; });

window.__updateScene = (t) => {
  window.__sceneTime = t;
  updateUniforms(t);
  applyCameraPath(t);
  const delta = clock.getDelta();
  mixers.forEach(m => m.update(delta));
  if (window.__tl) window.__tl.seek(t, false);
  composer.render();
};

// ---------------------------------------------------------------------------
// RAF loop (used when not under WVC control)
// ---------------------------------------------------------------------------
function raf() {
  if (window.__wvc_render) return;
  requestAnimationFrame(raf);
  const t = clock.getElapsedTime();
  updateUniforms(t);
  applyCameraPath(t);
  mixers.forEach(m => m.update(clock.getDelta()));
  composer.render();
}

// ---------------------------------------------------------------------------
// Initialization
// ---------------------------------------------------------------------------
async function init() {
  // Load configured objects
  for (const obj of configObjects) {
    await loadAsset(obj.assetId, obj.position, obj.rotation, obj.scale, obj.animations);
  }

  // Load configured panels
  configPanels.forEach((p, i) => {
    const pos = p.position || layoutPosition(i, configPanels.length);
    addPanel(p.html || '', pos, p.rotation, p.widthM ?? p.width, p.heightM ?? p.height);
  });

  // Avatar placeholder
  // TalkingHead avatar integration would go here.
  // For now, avatars from config are logged.
  const loadedAvatars = [];
  if (configAvatars.length > 0) {
    console.log('Avatar config received:', configAvatars);
    // Future: instantiate TalkingHead or avatar meshes here
  }

  // Notify world setup callback
  if (typeof window.__worldSetup === 'function') {
    window.__worldSetup(tl, loadedObjects, loadedAvatars);
  }

  // Signal ready
  window.__resolveReady();

  // Start RAF if not under WVC control
  if (!window.__wvc_render) requestAnimationFrame(raf);
}

init();
</script>
</body>
</html>
