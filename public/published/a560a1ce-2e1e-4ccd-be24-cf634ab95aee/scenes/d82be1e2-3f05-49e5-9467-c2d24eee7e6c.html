<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100vh; overflow: hidden; background: #ffffff; }
    canvas { display: block; width: 100%; height: 100%; }
  </style>
</head>
<body>
  <canvas id="c" width="1920" height="1080"></canvas>
  

  <script>
    // Pause/resume stubs — overwritten by generated code below
    window.__animFrame = null;
    window.__pause  = () => { cancelAnimationFrame(window.__animFrame); };
    window.__resume = () => {};

    document.addEventListener('DOMContentLoaded', () => {
      const audio = document.getElementById('scene-audio');
      if (audio) {
        audio.volume = 1;
        const _p = window.__pause, _r = window.__resume;
        window.__pause  = () => { _p(); audio.pause(); };
        window.__resume = () => { _r(); audio.play().catch(() => {}); };
      }
    });
  </script>

  <script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const DURATION = 8;
const START_T = parseFloat(new URLSearchParams(location.search).get('t') || '0');
const startWall = performance.now() - START_T * 1000;

function getT() { return (performance.now() - startWall) / 1000; }

// Easing helpers
const easeOut = t => 1 - Math.pow(1 - t, 3);
const easeIn  = t => t * t * t;
const lerp    = (a, b, t) => a + (b - a) * t;
const clamp01 = t => Math.max(0, Math.min(1, t));

function draw(t) {
  ctx.clearRect(0, 0, 1920, 1080);
  
  // Background
  ctx.fillStyle = '#181818';
  ctx.fillRect(0, 0, 1920, 1080);
  
  // Person coughing - centered figure
  const centerX = 960;
  const centerY = 540;
  
  // Head animation starts at t=0.5
  const headProgress = easeOut(clamp01((t - 0.5) / 1.5));
  if (headProgress > 0) {
    ctx.globalAlpha = headProgress;
    
    // Head outline
    ctx.strokeStyle = '#f0ece0';
    ctx.lineWidth = 8;
    ctx.beginPath();
    const headTilt = lerp(0, -0.3, easeOut(clamp01((t - 2) / 1)));
    ctx.save();
    ctx.translate(centerX, centerY - 100);
    ctx.rotate(headTilt);
    ctx.ellipse(0, 0, 120, 140, 0, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
    ctx.globalAlpha = 1;
  }
  
  // Facial features start at t=1
  const faceProgress = easeOut(clamp01((t - 1) / 1));
  if (faceProgress > 0) {
    ctx.globalAlpha = faceProgress;
    
    ctx.save();
    ctx.translate(centerX, centerY - 100);
    ctx.rotate(lerp(0, -0.3, easeOut(clamp01((t - 2) / 1))));
    
    // Eyes (closed/squinting from coughing)
    ctx.strokeStyle = '#f0ece0';
    ctx.lineWidth = 6;
    ctx.beginPath();
    ctx.moveTo(-40, -30);
    ctx.lineTo(-20, -35);
    ctx.moveTo(20, -35);
    ctx.lineTo(40, -30);
    ctx.stroke();
    
    // Nose
    ctx.beginPath();
    ctx.moveTo(0, -10);
    ctx.lineTo(-8, 10);
    ctx.lineTo(0, 15);
    ctx.lineTo(8, 10);
    ctx.stroke();
    
    ctx.restore();
    ctx.globalAlpha = 1;
  }
  
  // Mouth opening animation starts at t=1.5
  const mouthProgress = easeOut(clamp01((t - 1.5) / 1));
  if (mouthProgress > 0) {
    ctx.globalAlpha = mouthProgress;
    
    ctx.save();
    ctx.translate(centerX, centerY - 100);
    ctx.rotate(lerp(0, -0.3, easeOut(clamp01((t - 2) / 1))));
    
    // Open mouth (coughing)
    const mouthOpen = lerp(0, 1, easeOut(clamp01((t - 2.5) / 0.5)));
    ctx.fillStyle = '#121212';
    ctx.strokeStyle = '#f0ece0';
    ctx.lineWidth = 6;
    ctx.beginPath();
    ctx.ellipse(0, 40, 25, lerp(8, 30, mouthOpen), 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    
    ctx.restore();
    ctx.globalAlpha = 1;
  }
  
  // Body starts at t=2
  const bodyProgress = easeOut(clamp01((t - 2) / 1.5));
  if (bodyProgress > 0) {
    ctx.globalAlpha = bodyProgress;
    
    // Neck
    ctx.strokeStyle = '#f0ece0';
    ctx.lineWidth = 8;
    ctx.beginPath();
    ctx.moveTo(centerX - 30, centerY + 50);
    ctx.lineTo(centerX - 30, centerY + 120);
    ctx.moveTo(centerX + 30, centerY + 50);
    ctx.lineTo(centerX + 30, centerY + 120);
    ctx.stroke();
    
    // Shoulders and torso
    ctx.beginPath();
    ctx.moveTo(centerX - 30, centerY + 120);
    ctx.lineTo(centerX - 150, centerY + 150);
    ctx.lineTo(centerX - 150, centerY + 350);
    ctx.lineTo(centerX + 150, centerY + 350);
    ctx.lineTo(centerX + 150, centerY + 150);
    ctx.lineTo(centerX + 30, centerY + 120);
    ctx.stroke();
    
    ctx.globalAlpha = 1;
  }
  
  // Hand covering mouth starts at t=3
  const handProgress = easeOut(clamp01((t - 3) / 1));
  if (handProgress > 0) {
    ctx.globalAlpha = handProgress;
    
    const handX = lerp(centerX + 200, centerX - 50, handProgress);
    const handY = lerp(centerY + 200, centerY - 80, handProgress);
    
    // Hand
    ctx.fillStyle = '#f0ece0';
    ctx.strokeStyle = '#151515';
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.ellipse(handX, handY, 40, 60, -0.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    
    // Fingers
    for (let i = 0; i < 4; i++) {
      ctx.beginPath();
      ctx.ellipse(handX - 20 + i * 12, handY - 35, 8, 25, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
    }
    
    ctx.globalAlpha = 1;
  }
  
  // Cough particles start at t=4
  const particleProgress = clamp01((t - 4) / 3);
  if (particleProgress > 0) {
    ctx.fillStyle = '#e84545';
    
    for (let i = 0; i < 15; i++) {
      const angle = (i / 15) * Math.PI * 0.8 - Math.PI * 0.4;
      const distance = lerp(0, 300 + i * 20, easeOut(particleProgress));
      const x = centerX + Math.cos(angle + 0.3) * distance;
      const y = centerY - 80 + Math.sin(angle + 0.3) * distance;
      
      const size = lerp(8, 3, particleProgress);
      const alpha = lerp(0.8, 0, particleProgress);
      
      ctx.globalAlpha = alpha;
      ctx.beginPath();
      ctx.arc(x, y, size, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }
  
  // Vibration lines around person (coughing intensity) at t=3.5
  const vibeProgress = clamp01((t - 3.5) / 2);
  if (vibeProgress > 0) {
    ctx.strokeStyle = '#151515';
    ctx.lineWidth = 3;
    ctx.globalAlpha = lerp(0.6, 0, vibeProgress);
    
    for (let i = 0; i < 8; i++) {
      const angle = (i / 8) * Math.PI * 2;
      const radius = 200 + Math.sin(t * 10) * 20;
      const x1 = centerX + Math.cos(angle) * radius;
      const y1 = centerY + Math.sin(angle) * radius;
      const x2 = centerX + Math.cos(angle) * (radius + 30);
      const y2 = centerY + Math.sin(angle) * (radius + 30);
      
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }
  
  // Warning text appears at t=6
  const textProgress = easeOut(clamp01((t - 6) / 1.5));
  if (textProgress > 0) {
    ctx.globalAlpha = textProgress;
    ctx.fillStyle = '#e84545';
    ctx.font = 'bold 72px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('COVER YOUR COUGH', centerX, 150);
    
    ctx.fillStyle = '#f0ece0';
    ctx.font = 'bold 48px sans-serif';
    ctx.fillText('Protect Others', centerX, 950);
    ctx.globalAlpha = 1;
  }
}

function loop() {
  const t = getT();
  if (t < DURATION) {
    draw(t);
    window.__animFrame = requestAnimationFrame(loop);
  } else {
    draw(DURATION);
  }
}

window.__pause  = () => { cancelAnimationFrame(window.__animFrame); };
window.__resume = () => { window.__animFrame = requestAnimationFrame(loop); };

window.__animFrame = requestAnimationFrame(loop);
  </script>
</body>
</html>
