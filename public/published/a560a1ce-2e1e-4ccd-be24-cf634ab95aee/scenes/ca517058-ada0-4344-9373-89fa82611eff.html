<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100vh; overflow: hidden; background: #fffef9; }
    #chart { width: 100%; height: 100%; }
    .chart-title { font-family: sans-serif; font-size: 48px; font-weight: bold; fill: #181818; text-anchor: middle; } .axis-label { font-family: sans-serif; font-size: 20px; fill: #181818; text-anchor: middle; } .axis-text { font-family: sans-serif; font-size: 16px; fill: #121212; } .grid-line { stroke: #151515; stroke-width: 1; stroke-opacity: 0.3; } .flu-bar { fill: #e84545; stroke: none; } .data-label { font-family: sans-serif; font-size: 18px; fill: #181818; text-anchor: middle; font-weight: bold; } .trend-line { fill: none; stroke: #121212; stroke-width: 3; }
  </style>
</head>
<body>
  <div id="chart"></div>
  

  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
  <script>
    const DATA = [{"month":"Oct","cases":45},{"month":"Nov","cases":78},{"month":"Dec","cases":124},{"month":"Jan","cases":189},{"month":"Feb","cases":156},{"month":"Mar","cases":98},{"month":"Apr","cases":52},{"month":"May","cases":23}];
    const WIDTH = 1920, HEIGHT = 1080;
    window.__pause  = () => {};
    window.__resume = () => {};

    document.addEventListener('DOMContentLoaded', () => {
      const audio = document.getElementById('scene-audio');
      if (audio) {
        audio.volume = 1;
        window.__pause  = () => { audio.pause(); };
        window.__resume = () => { audio.play().catch(() => {}); };
      }
    });

    const svg = d3.select('#chart').append('svg').attr('viewBox', '0 0 1920 1080').attr('width', '100%').attr('height', '100%'); const margin = {top: 120, right: 80, bottom: 120, left: 140}; const chartWidth = WIDTH - margin.left - margin.right; const chartHeight = HEIGHT - margin.top - margin.bottom; const chartArea = svg.append('g').attr('transform', `translate(${margin.left}, ${margin.top})`); const xScale = d3.scaleBand().domain(DATA.map(d => d.month)).range([0, chartWidth]).padding(0.15); const yScale = d3.scaleLinear().domain([0, d3.max(DATA, d => d.cases) * 1.1]).range([chartHeight, 0]); const yTicks = yScale.ticks(8); yTicks.forEach(tick => { chartArea.append('line').attr('class', 'grid-line').attr('x1', 0).attr('x2', chartWidth).attr('y1', yScale(tick)).attr('y2', yScale(tick)).style('opacity', 0).transition().duration(2000).delay(1000).ease(d3.easeCubicOut).style('opacity', 0.3); }); const xAxis = d3.axisBottom(xScale).tickSize(0).tickPadding(15); const yAxis = d3.axisLeft(yScale).tickSize(0).tickPadding(10).tickFormat(d => d + 'K'); chartArea.append('g').attr('class', 'x-axis').attr('transform', `translate(0, ${chartHeight})`).style('opacity', 0).call(xAxis).transition().duration(1500).delay(500).ease(d3.easeCubicOut).style('opacity', 1); chartArea.append('g').attr('class', 'y-axis').style('opacity', 0).call(yAxis).transition().duration(1500).delay(800).ease(d3.easeCubicOut).style('opacity', 1); chartArea.selectAll('.flu-bar').data(DATA).enter().append('rect').attr('class', 'flu-bar').attr('x', d => xScale(d.month)).attr('y', chartHeight).attr('width', xScale.bandwidth()).attr('height', 0).style('opacity', 0).transition().duration(1200).delay((d, i) => 2000 + i * 100).ease(d3.easeCubicOut).attr('y', d => yScale(d.cases)).attr('height', d => chartHeight - yScale(d.cases)).style('opacity', 1); chartArea.selectAll('.data-label').data(DATA).enter().append('text').attr('class', 'data-label').attr('x', d => xScale(d.month) + xScale.bandwidth() / 2).attr('y', d => yScale(d.cases) - 10).text(d => d.cases + 'K').style('opacity', 0).transition().duration(800).delay((d, i) => 3500 + i * 100).ease(d3.easeCubicOut).style('opacity', 1); const line = d3.line().x(d => xScale(d.month) + xScale.bandwidth() / 2).y(d => yScale(d.cases)).curve(d3.curveCardinal); const path = chartArea.append('path').datum(DATA).attr('class', 'trend-line').attr('d', line); const totalLength = path.node().getTotalLength(); path.attr('stroke-dasharray', totalLength + ' ' + totalLength).attr('stroke-dashoffset', totalLength).style('opacity', 0).transition().duration(2000).delay(4000).ease(d3.easeCubicOut).attr('stroke-dashoffset', 0).style('opacity', 0.6); svg.append('text').attr('class', 'chart-title').attr('x', WIDTH / 2).attr('y', 60).text('Flu Cases by Month (2023-2024 Season)').style('opacity', 0).transition().duration(1500).delay(200).ease(d3.easeCubicOut).style('opacity', 1); svg.append('text').attr('class', 'axis-label').attr('x', WIDTH / 2).attr('y', HEIGHT - 30).text('Month').style('opacity', 0).transition().duration(1000).delay(1200).ease(d3.easeCubicOut).style('opacity', 1); svg.append('text').attr('class', 'axis-label').attr('transform', 'rotate(-90)').attr('y', 40).attr('x', -HEIGHT / 2).text('Cases (Thousands)').style('opacity', 0).transition().duration(1000).delay(1400).ease(d3.easeCubicOut).style('opacity', 1);
  </script>
</body>
</html>
