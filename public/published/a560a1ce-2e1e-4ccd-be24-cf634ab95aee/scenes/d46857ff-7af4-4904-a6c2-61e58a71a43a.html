<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; animation-play-state: paused; }
    body { width: 1920px; height: 1080px; overflow: hidden; background: #fffef9; }

    #video-layer {
      position: absolute; inset: 0;
      opacity: 1;
      z-index: 1;
      display: none;
    }
    #video-layer video { width: 100%; height: 100%; object-fit: cover; }

    #svg-layer {
      position: absolute; inset: 0;
      z-index: 2;
    }
    #svg-layer svg { width: 100%; height: 100%; }

    .text-overlay {
      position: absolute;
      z-index: 3;
      opacity: 0;
      white-space: pre-wrap;
    }

    .svg-object svg { width: 100%; height: auto; display: block; background: transparent; }

    /* Stroke animation */
    .stroke {
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: var(--len, 1000);
      stroke-dashoffset: var(--len, 1000);
      animation: draw var(--dur, 1s) ease-in-out var(--delay, 0s) forwards;
    }
    .fadein {
      opacity: 0;
      animation: pop var(--dur, 0.4s) ease var(--delay, 0s) forwards;
    }
    @keyframes draw      { to { stroke-dashoffset: 0; } }
    @keyframes pop       { to { opacity: 1; } }
    @keyframes scaleIn   { from { opacity: 0; transform: scale(0); } to { opacity: 1; transform: scale(1); } }
    @keyframes slideUp   { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideLeft { from { opacity: 0; transform: translateX(50px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes bounceIn  { 0% { opacity: 0; transform: scale(0); } 60% { opacity: 1; transform: scale(1.15); } 100% { transform: scale(1); } }
    @keyframes rotateIn  { from { opacity: 0; transform: rotate(-15deg); } to { opacity: 1; transform: rotate(0deg); } }
    @keyframes fadeInOverlay { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUpOverlay {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .scale {
      opacity: 0; transform-origin: center center;
      animation: scaleIn var(--dur, 0.4s) ease var(--delay, 0s) forwards;
    }
    .slide-up {
      opacity: 0;
      animation: slideUp var(--dur, 0.5s) ease var(--delay, 0s) forwards;
    }
    .slide-left {
      opacity: 0;
      animation: slideLeft var(--dur, 0.5s) ease var(--delay, 0s) forwards;
    }
    .bounce {
      opacity: 0; transform-origin: center center;
      animation: bounceIn var(--dur, 0.6s) cubic-bezier(0.34, 1.56, 0.64, 1) var(--delay, 0s) forwards;
    }
    .rotate {
      opacity: 0; transform-origin: center center;
      animation: rotateIn var(--dur, 0.5s) ease var(--delay, 0s) forwards;
    }
  </style>
</head>
<body>

  <div id="video-layer">
    
  </div>

  

  

  <div class="svg-object" id="obj-cfc32230-ed68-41c2-9dae-5fb1bb2d3a15" style="position:absolute;left:0%;top:0%;width:100%;opacity:1;z-index:2;pointer-events:none;"><svg viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">

    .fadein { opacity: 0; animation: fadein var(--dur, 1s) ease-out var(--delay, 0s) forwards; }
    @keyframes fadein { to { opacity: 1; } }
    
    .scale { opacity: 0; transform: scale(0); transform-origin: center; animation: scale var(--dur, 1s) ease-out var(--delay, 0s) forwards; }
    @keyframes scale { to { opacity: 1; transform: scale(1); } }
    
    .slide-up { opacity: 0; transform: translateY(40px); animation: slideup var(--dur, 1s) ease-out var(--delay, 0s) forwards; }
    @keyframes slideup { to { opacity: 1; transform: translateY(0); } }
    
    .slide-left { opacity: 0; transform: translateX(40px); animation: slideleft var(--dur, 1s) ease-out var(--delay, 0s) forwards; }

    .bounce { opacity: 0; transform: scale(0); transform-origin: center; animation: bounce var(--dur, 1s) ease-out var(--delay, 0s) forwards; }
    @keyframes bounce { 0% { opacity: 0; transform: scale(0); } 60% { opacity: 1; transform: scale(1.1); } 100% { opacity: 1; transform: scale(1); } }
    
    .rotate { opacity: 0; transform: rotate(-180deg); transform-origin: center; animation: rotate var(--dur, 1s) ease-out var(--delay, 0s) forwards; }
    @keyframes rotate { to { opacity: 1; transform: rotate(0deg); } }

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Auto-calculate stroke-dasharray lengths
      document.querySelectorAll('.stroke').forEach(el => {
        if (el.getTotalLength) {
          el.style.setProperty('--len', el.getTotalLength());
        }
      });

      const video = document.querySelector('#video-layer video');
      if (video) video.currentTime = 0;

      const audio = document.getElementById('scene-audio');
      if (audio) audio.volume = 1;

      // Scrub: offset animation delays by -t seconds for all animated elements
      const t = parseFloat(new URLSearchParams(location.search).get('t') || '0');
      if (t > 0) {
        document.querySelectorAll('*').forEach(el => {
          const s = window.getComputedStyle(el);
          if (s.animationName && s.animationName !== 'none') {
            const delay = parseFloat(s.animationDelay) || 0;
            el.style.animationDelay = (delay - t) + 's';
          }
        });
        if (video) video.currentTime = 0 + t;
      }
    });
  </script>
