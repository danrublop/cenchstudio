<body>

  </div><!-- /scene-camera -->

  <script>
    var SCENE_ID     = '8671cb6d-5ee1-46f7-a61b-4b9ac4da199c';
    var PALETTE      = ["#1a1a2e","#e84545","#16a34a","#2563eb"];
    var DURATION     = 25;
    var ROUGHNESS    = 1.5;
    var FONT         = 'Caveat';
    var STROKE_COLOR = '#1a1a2e';
    var WIDTH        = 1920;
    var HEIGHT       = 1080;

    // Audio volume is handled by the playback controller
  </script>

  <script>
(function() {
  // ── performance.now() interception ──────────────────────
  // Canvas2D scenes compute animation time via:
  //   getT() = (performance.now() - startWall) / 1000
  // When RAF is blocked (paused), elapsed wall-clock time
  // shouldn't count toward animation time. We subtract
  // cumulative paused duration from performance.now().
  var _perfNow = performance.now.bind(performance);
  var _pauseOffset = 0;
  var _pauseStart = _perfNow(); // starts paused

  performance.now = function() {
    return _perfNow() - _pauseOffset;
  };

  // ── RAF interception ─────────────────────────────────────
  // Prevent old canvas2d/three.js scenes from auto-starting
  // their requestAnimationFrame loops. We capture the callback
  // and only start it when the parent sends 'play'.
  var _realRAF = window.requestAnimationFrame.bind(window);
  var _realCAF = window.cancelAnimationFrame.bind(window);
  var _realSetTimeout = window.setTimeout.bind(window);
  var _realClearTimeout = window.clearTimeout.bind(window);
  var _realSetInterval = window.setInterval.bind(window);
  var _realClearInterval = window.clearInterval.bind(window);
  // Expose native RAF so overlay widgets (TalkingHead) can bypass interception.
  // When __rafUnlocked is set, _blockRAF skips re-intercepting RAF so
  // TalkingHead's Three.js animation loop keeps running during pause.
  window.__nativeRAF = _realRAF;
  window.__nativeCAF = _realCAF;
  window.__rafUnlocked = false;
  var _pendingRAFCallbacks = [];
  var _rafBlocked = true;  // starts blocked
  var _currentRAFId = null;
  var _timersBlocked = true; // starts blocked (playback paused)
  var _nextQueuedTimerId = 1;
  var _queuedTimeouts = [];
  var _queuedTimeoutMap = {};
  var _activeTimeouts = {};
  var _activeIntervals = {};

  function _flushQueuedTimeouts() {
    if (_timersBlocked || _queuedTimeouts.length === 0) return;
    var queue = _queuedTimeouts.slice();
    _queuedTimeouts = [];
    queue.forEach(function(item) {
      if (!item || !_queuedTimeoutMap[item.id]) return;
      delete _queuedTimeoutMap[item.id];
      var realId = _realSetTimeout(function() {
        delete _activeTimeouts[item.id];
        if (_timersBlocked) {
          _queuedTimeoutMap[item.id] = item;
          _queuedTimeouts.push(item);
          return;
        }
        try { item.cb(); } catch(e) {}
      }, Math.max(0, item.delay || 0));
      _activeTimeouts[item.id] = realId;
    });
  }

  window.setTimeout = function(cb, delay) {
    if (typeof cb !== 'function') {
      return _realSetTimeout(cb, delay);
    }
    var id = _nextQueuedTimerId++;
    var item = { id: id, cb: cb, delay: Number(delay) || 0 };
    if (_timersBlocked) {
      _queuedTimeoutMap[id] = item;
      _queuedTimeouts.push(item);
      return -id;
    }
    var realId = _realSetTimeout(function() {
      delete _activeTimeouts[id];
      if (_timersBlocked) {
        _queuedTimeoutMap[id] = item;
        _queuedTimeouts.push(item);
        return;
      }
      try { cb(); } catch(e) {}
    }, Math.max(0, item.delay));
    _activeTimeouts[id] = realId;
    return id;
  };

  window.clearTimeout = function(id) {
    var absId = Math.abs(Number(id));
    if (!absId) {
      _realClearTimeout(id);
      return;
    }
    if (_queuedTimeoutMap[absId]) {
      delete _queuedTimeoutMap[absId];
      _queuedTimeouts = _queuedTimeouts.filter(function(item) { return item.id !== absId; });
      return;
    }
    if (_activeTimeouts[absId]) {
      _realClearTimeout(_activeTimeouts[absId]);
      delete _activeTimeouts[absId];
      return;
    }
    _realClearTimeout(id);
  };

  window.setInterval = function(cb, delay) {
    if (typeof cb !== 'function') {
      return _realSetInterval(cb, delay);
    }
    var id = _nextQueuedTimerId++;
    var realId = _realSetInterval(function() {
      if (_timersBlocked) return;
      try { cb(); } catch(e) {}
    }, Math.max(1, Number(delay) || 0));
    _activeIntervals[id] = realId;
    return id;
  };

  window.clearInterval = function(id) {
    var absId = Math.abs(Number(id));
    if (absId && _activeIntervals[absId]) {
      _realClearInterval(_activeIntervals[absId]);
      delete _activeIntervals[absId];
      return;
    }
    _realClearInterval(id);
  };

  window.requestAnimationFrame = function(cb) {
    if (_rafBlocked) {
      // Queue the callback — multiple consumers (scene code + TalkingHead) may register
      var queueId = -(_pendingRAFCallbacks.length + 1);
      _pendingRAFCallbacks.push(cb);
      return queueId;
    }
    _currentRAFId = _realRAF(cb);
    return _currentRAFId;
  };
  window.cancelAnimationFrame = function(id) {
    if (id < 0) {
      // Remove from pending queue
      var idx = (-id) - 1;
      if (idx < _pendingRAFCallbacks.length) _pendingRAFCallbacks[idx] = null;
      return;
    }
    _currentRAFId = null;
    _realCAF(id);
  };

  function _unblockRAF() {
    // Accumulate paused duration so performance.now() skips it
    if (_pauseStart !== null) {
      _pauseOffset += _perfNow() - _pauseStart;
      _pauseStart = null;
    }
    _rafBlocked = false;
    _timersBlocked = false;
    // Restore native RAF for GSAP and future calls
    window.requestAnimationFrame = _realRAF;
    window.cancelAnimationFrame = _realCAF;
    // Reset the time origin for old canvas2d code that uses
    // window.startWall. (Local const startWall is handled by
    // the performance.now() interception above.)
    if (typeof window.startWall !== 'undefined') {
      window.startWall = performance.now();
    }
    // Also reset _startTime (used by some old Zdog/Three scenes)
    if (typeof window._startTime !== 'undefined') {
      window._startTime = performance.now();
    }
    _flushQueuedTimeouts();
    // Kick off all queued callbacks (scene code + TalkingHead, etc.)
    var queued = _pendingRAFCallbacks.slice();
    _pendingRAFCallbacks = [];
    queued.forEach(function(cb) { if (cb) _realRAF(cb); });
    // Also call legacy __resume if scene code defined it
    if (window.__resume && window.__resume !== _legacyResume) {
      try { window.__resume(); } catch(e) {}
    }
  }

  function _blockRAF() {
    // Record pause start for performance.now() offset tracking
    if (_pauseStart === null) {
      _pauseStart = _perfNow();
    }
    _timersBlocked = true;
    // If RAF was permanently unlocked (TalkingHead present), skip blocking
    // so the 3D avatar animation loop keeps running during pause
    if (window.__rafUnlocked) {
      // Still call legacy pause handlers
      if (window.__pause && window.__pause !== _legacyPause) {
        try { window.__pause(); } catch(e) {}
      }
      return;
    }
    _rafBlocked = true;
    // Cancel any in-flight RAF
    if (_currentRAFId) { _realCAF(_currentRAFId); _currentRAFId = null; }
    // Override RAF again to block new calls
    _pendingRAFCallbacks = [];
    window.requestAnimationFrame = function(cb) {
      var queueId = -(_pendingRAFCallbacks.length + 1);
      _pendingRAFCallbacks.push(cb);
      return queueId;
    };
    // Also call legacy __pause if scene code defined it
    if (window.__pause && window.__pause !== _legacyPause) {
      try { window.__pause(); } catch(e) {}
    }
  }

  // ── Master timeline ──────────────────────────────────────
  // Starts paused. Nothing plays until parent sends 'play'.
  var masterTL = gsap.timeline({
    paused: true,
    onComplete: function() {
      postToParent({ type: 'ended' });
    },
    onUpdate: function() {
      postToParent({
        type: 'timeupdate',
        currentTime: masterTL.time(),
      });
    },
  });

  // Guarantee timeline duration matches scene duration.
  // Scene code may not fill the full duration, but the timeline
  // should always report the correct total length.
  // Avatar / edge cases: if DURATION is missing or NaN, seek/play/scrub all break (duration 0).
  var _rawDur =
    typeof DURATION === 'number' && !isNaN(DURATION) && DURATION > 0
      ? DURATION
      : typeof window.DURATION === 'number' && !isNaN(window.DURATION) && window.DURATION > 0
        ? window.DURATION
        : 8;
  var _cenchDuration = Math.max(0.1, _rawDur);
  masterTL.to({}, { duration: _cenchDuration }, 0);

  // Public API for scene code
  window.__tl = masterTL;

  // ── Multi-track audio integration ───────────────────────
  var ttsAudio = null;
  var sfxElements = [];
  var musicAudio = null;
  var legacyAudio = [];

  window.addEventListener('load', function() {
    ttsAudio = document.getElementById('scene-tts') || document.getElementById('scene-audio');
    sfxElements = Array.from(document.querySelectorAll('[data-track="sfx"]'));
    musicAudio = document.getElementById('scene-music');
    legacyAudio = Array.from(document.querySelectorAll('audio')).filter(function(a) {
      return !a.dataset.track && a.id !== 'scene-tts' && a.id !== 'scene-audio' && a.id !== 'scene-music';
    });

    // Set initial volumes (Layers panel / audioLayer.volume on TTS + legacy track)
    if (ttsAudio) {
      var ttsVol = parseFloat(ttsAudio.dataset.volume || '1');
      ttsAudio.volume = Number.isFinite(ttsVol) ? Math.min(1, Math.max(0, ttsVol)) : 1;
      var ttsOff = parseFloat(ttsAudio.dataset.startOffset || '0');
      if (Number.isFinite(ttsOff) && ttsOff > 0) {
        try { ttsAudio.currentTime = ttsOff; } catch(e) {}
      }
    }
    if (musicAudio) {
      musicAudio.volume = parseFloat(musicAudio.dataset.volume || '0.12');
    }
    sfxElements.forEach(function(el) {
      el.volume = parseFloat(el.dataset.volume || '0.8');
    });

    // Schedule SFX triggers on the GSAP timeline
    if (window.__tl) {
      sfxElements.forEach(function(el) {
        var triggerAt = parseFloat(el.dataset.triggerAt || '0');
        window.__tl.call(function() {
          el.currentTime = 0;
          el.play().catch(function(){});
        }, null, triggerAt);
      });
    }

    // Music ducking: reduce music volume during TTS playback
    if (musicAudio && ttsAudio && musicAudio.dataset.duck === 'true') {
      var normalVol = parseFloat(musicAudio.dataset.volume || '0.12');
      var duckLevel = parseFloat(musicAudio.dataset.duckLevel || '0.2');
      var duckVol = normalVol * duckLevel;
      ttsAudio.addEventListener('play', function() { musicAudio.volume = duckVol; });
      ttsAudio.addEventListener('pause', function() { musicAudio.volume = normalVol; });
      ttsAudio.addEventListener('ended', function() { musicAudio.volume = normalVol; });
    }

    // Web Speech API fallback
    var ttsConfig = document.getElementById('scene-tts-config');
    if (ttsConfig && !ttsAudio) {
      window.__webSpeechConfig = {
        provider: ttsConfig.dataset.provider,
        text: ttsConfig.dataset.text,
        voice: ttsConfig.dataset.voice,
      };
    }

    // Initial sync: refs exist now; timeline starts paused — keep media paused too
    try { syncMedia(false); } catch(e) {}
  });

  function syncMedia(playing) {
    // TTS
    if (ttsAudio) {
      try {
        if (playing) {
          ttsAudio.play().catch(function(err) {
            console.warn('[cench-playback] TTS play() failed (sandbox/autoplay?):', err);
          });
        } else {
          ttsAudio.pause();
        }
      } catch(e) {}
    }

    // Web Speech API fallback
    if (!ttsAudio && window.__webSpeechConfig && window.speechSynthesis) {
      if (playing) {
        if (!window.__webSpeechActive) {
          var u = new SpeechSynthesisUtterance(window.__webSpeechConfig.text);
          if (window.__webSpeechConfig.voice) {
            var voices = speechSynthesis.getVoices();
            var match = voices.find(function(v) { return v.name === window.__webSpeechConfig.voice; });
            if (match) u.voice = match;
          }
          speechSynthesis.speak(u);
          window.__webSpeechActive = true;
          u.onend = function() { window.__webSpeechActive = false; };
        }
      } else {
        speechSynthesis.cancel();
        window.__webSpeechActive = false;
      }
    }

    // Puter.js fallback
    if (!ttsAudio && window.__webSpeechConfig && window.__webSpeechConfig.provider === 'puter' && window.puter) {
      if (playing && !window.__puterAudioPlaying) {
        window.puter.ai.txt2speech(window.__webSpeechConfig.text, {
          provider: 'openai',
          voice: window.__webSpeechConfig.voice || 'nova',
        }).then(function(audioEl) {
          audioEl.play();
          window.__puterAudioPlaying = true;
          audioEl.onended = function() { window.__puterAudioPlaying = false; };
        }).catch(function(){});
      }
    }

    // Music
    if (musicAudio) {
      try {
        if (playing) musicAudio.play().catch(function(){});
        else musicAudio.pause();
      } catch(e) {}
    }

    // SFX are triggered by GSAP timeline callbacks, not play/pause
    // But stop them on pause
    if (!playing) {
      sfxElements.forEach(function(el) {
        try { el.pause(); } catch(e) {}
      });
    }

    // Legacy audio elements
    legacyAudio.forEach(function(a) {
      try {
        if (playing) a.play().catch(function(){});
        else a.pause();
      } catch(e) {}
    });

    // Videos (avatar, veo3 layers)
    var videos = document.querySelectorAll('video');
    videos.forEach(function(v) {
      try {
        if (playing) v.play().catch(function(){});
        else v.pause();
      } catch(e) {}
    });

    // CSS animations (legacy SVG scenes)
    var cssCtrl = document.getElementById('__gsap_css_ctrl');
    if (!cssCtrl) {
      cssCtrl = document.createElement('style');
      cssCtrl.id = '__gsap_css_ctrl';
      document.head.appendChild(cssCtrl);
    }
    cssCtrl.textContent = playing
      ? '*, *::before, *::after { animation-play-state: running !important; }'
      : '*, *::before, *::after { animation-play-state: paused !important; }';
    // After play(), WAAPI owns playback — CSS paused alone does not freeze animations.
    if (!playing) {
      _pauseCSSAnimations();
    }
  }

  // ── CSS animation control via Web Animations API ─────────
  // SVG scenes use CSS @keyframes which can't be seeked by GSAP.
  // The Web Animations API gives us seekable Animation objects.
  // After seeking (which calls anim.pause()), we MUST call anim.play()
  // to resume — CSS animation-play-state alone can't override API pause.
  function _pauseCSSAnimations() {
    if (!document.getAnimations) return;
    function pauseEach(list) {
      list.forEach(function(anim) {
        try {
          anim.pause();
        } catch(e) {}
      });
    }
    var anims = document.getAnimations();
    pauseEach(anims);
    if (anims.length === 0) {
      _realRAF(function() {
        pauseEach(document.getAnimations ? document.getAnimations() : []);
      });
    }
  }

  function _seekCSSAnimations(timeMs) {
    if (!document.getAnimations) return;
    var anims = document.getAnimations();
    if (anims.length > 0) {
      anims.forEach(function(anim) {
        try {
          anim.currentTime = timeMs;
          anim.pause();
        } catch(e) {}
      });
    } else {
      // Animations may not exist yet (iframe just became visible).
      // Retry after the browser renders a frame.
      _realRAF(function() {
        var retryAnims = document.getAnimations ? document.getAnimations() : [];
        retryAnims.forEach(function(anim) {
          try {
            anim.currentTime = timeMs;
            anim.pause();
          } catch(e) {}
        });
      });
    }
  }

  function _resumeCSSAnimations() {
    if (!document.getAnimations) return;
    var anims = document.getAnimations();
    if (anims.length > 0) {
      anims.forEach(function(anim) {
        try { anim.play(); } catch(e) {}
      });
    } else {
      _realRAF(function() {
        var retryAnims = document.getAnimations ? document.getAnimations() : [];
        retryAnims.forEach(function(anim) {
          try { anim.play(); } catch(e) {}
        });
      });
    }
  }

  // ── postMessage bridge ───────────────────────────────────
  function postToParent(msg) {
    try {
      window.parent.postMessage(
        Object.assign({
          source: 'cench-scene',
          sceneId: typeof SCENE_ID !== 'undefined' ? SCENE_ID : null,
        }, msg),
        '*'
      );
    } catch(e) {}
  }

  function refreshMediaRefs() {
    if (!ttsAudio) {
      ttsAudio = document.getElementById('scene-tts') || document.getElementById('scene-audio');
      if (ttsAudio) {
        var rv = parseFloat(ttsAudio.dataset.volume || '1');
        ttsAudio.volume = Number.isFinite(rv) ? Math.min(1, Math.max(0, rv)) : 1;
        var ro = parseFloat(ttsAudio.dataset.startOffset || '0');
        if (Number.isFinite(ro) && ro > 0) { try { ttsAudio.currentTime = ro; } catch(e) {} }
      }
    }
    if (!musicAudio) {
      musicAudio = document.getElementById('scene-music');
      if (musicAudio) {
        musicAudio.volume = parseFloat(musicAudio.dataset.volume || '0.12');
      }
    }
  }

  window.addEventListener('message', function(event) {
    if (!event.data || event.data.target !== 'cench-scene') return;
    // Ignore messages for other scenes
    if (
      event.data.sceneId &&
      typeof SCENE_ID !== 'undefined' &&
      event.data.sceneId !== SCENE_ID
    ) return;

    refreshMediaRefs();

    var cmd = event.data;

    switch (cmd.type) {

      case 'play':
        if (masterTL.time() >= masterTL.duration()) {
          masterTL.seek(0);
          _seekCSSAnimations(0);
          if (ttsAudio) {
            var rOff = parseFloat(ttsAudio.dataset.startOffset || '0');
            try { ttsAudio.currentTime = Number.isFinite(rOff) ? rOff : 0; } catch(e) {}
          }
        }
        _unblockRAF();   // let legacy RAF loops run
        gsap.ticker.wake();  // ensure ticker is active after pause
        masterTL.play();
        syncMedia(true);
        _resumeCSSAnimations();  // Must call anim.play() via API — CSS rule alone can't override API pause
        // Avatar sync — restore active mood + start speech on first play
        if (window.__avatarHead) {
          try {
            window.__avatarHead.setMood(window.__avatarMood || 'happy');
            if (!window.__avatarSpeechStarted && window.__avatarStartSpeech) {
              window.__avatarStartSpeech();
              window.__avatarSpeechStarted = true;
            }
          } catch(e) {}
        }
        postToParent({ type: 'playing' });
        break;

      case 'pause':
        _blockRAF();     // stop legacy RAF loops
        masterTL.pause();
        syncMedia(false);  // CSS animation-play-state: paused handles SVG scenes
        // Avatar sync — go idle (still breathes/blinks, stops speaking)
        if (window.__avatarHead) {
          try {
            if (window.__avatarHead.stopSpeaking) window.__avatarHead.stopSpeaking();
            window.__avatarHead.setMood('neutral');
            // Allow speech to restart on next play (stopSpeaking clears the queue)
            window.__avatarSpeechStarted = false;
          } catch(e) {}
        }
        postToParent({
          type: 'paused',
          currentTime: masterTL.time(),
        });
        break;

      case 'seek':
        var seekTime = Math.max(0, Math.min(cmd.time, masterTL.duration()));
        masterTL.seek(seekTime);
        // Force GSAP to re-evaluate all tweens and fire onUpdate
        masterTL.progress(masterTL.progress());
        // Belt-and-suspenders: call draw() directly for canvas2d scenes
        if (typeof window.draw === 'function') {
          try { window.draw(seekTime); } catch(e) {}
        }
        // Three.js / 3d_world / void / studio: RAF is blocked while paused, so one shot per seek
        if (typeof window.__updateScene === 'function') {
          try { window.__updateScene(seekTime); } catch(e) {}
        }
        // Sync all audio to seek position (optional startOffset skips into the file)
        if (ttsAudio) {
          var sOff = parseFloat(ttsAudio.dataset.startOffset || '0');
          var ttsT = seekTime + (Number.isFinite(sOff) ? sOff : 0);
          try { ttsAudio.currentTime = Math.max(0, ttsT); } catch(e) {}
        }
        if (musicAudio) { try { musicAudio.currentTime = seekTime; } catch(e) {} }
        sfxElements.forEach(function(el) {
          try { el.pause(); el.currentTime = 0; } catch(e) {}
        });
        legacyAudio.forEach(function(a) {
          try { a.currentTime = seekTime; } catch(e) {}
        });
        document.querySelectorAll('video').forEach(function(v) {
          try { v.currentTime = seekTime; } catch(e) {}
        });
        // Seek CSS animations (SVG scenes with @keyframes)
        _seekCSSAnimations(seekTime * 1000);
        // Pause after seeking (parent can send 'play' after if desired)
        if (!masterTL.isActive()) {
          masterTL.pause();
        }
        syncMedia(false);
        postToParent({
          type: 'seeked',
          currentTime: masterTL.time(),
        });
        break;

      case 'reset':
        _blockRAF();
        masterTL.seek(0).pause();
        _seekCSSAnimations(0);
        if (ttsAudio) {
          var zOff = parseFloat(ttsAudio.dataset.startOffset || '0');
          try { ttsAudio.currentTime = Number.isFinite(zOff) ? zOff : 0; } catch(e) {}
        }
        if (musicAudio) { try { musicAudio.currentTime = 0; } catch(e) {} }
        legacyAudio.forEach(function(a) {
          var lo = parseFloat(a.dataset.startOffset || '0');
          try { a.currentTime = Number.isFinite(lo) ? lo : 0; } catch(e) {}
        });
        syncMedia(false);
        // Avatar sync — reset to idle, allow speech restart
        if (window.__avatarHead) {
          try {
            if (window.__avatarHead.stopSpeaking) window.__avatarHead.stopSpeaking();
            window.__avatarHead.setMood('neutral');
            window.__avatarSpeechStarted = false;
          } catch(e) {}
        }
        postToParent({ type: 'reset' });
        break;

      // ── Avatar live control (from settings panel) ──────────
      case 'avatar_command':

    {"styles":"@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');\n*{margin:0;padding:0;box-sizing:border-box}\nbody{font-family:'Inter',sans-serif;background:#0a1628;color:#fff;width:100%;height:100vh;overflow:hidden}\n.container{display:flex;flex-direction:column;width:100%;height:100vh;padding:3% 5%}\n.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:2%}\n.heading{font-size:clamp(24px,3vw,48px);font-weight:800;opacity:0;animation:fadeSlideUp .6s ease-out .2s forwards}\n.heading span{background:linear-gradient(135deg,#ef4444,#f97316);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}\n@keyframes fadeSlideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}\n.score-display{font-size:clamp(14px,1.5vw,20px);color:rgba(255,255,255,0.7);opacity:0;animation:fadeSlideUp .5s ease-out .4s forwards}\n.score-display b{color:#a3e635}\n.quiz-area{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;position:relative}\n.question-card{width:90%;max-width:1400px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:18px;padding:clamp(20px,3%,40px);display:none;flex-direction:column;gap:clamp(12px,2%,24px)}\n.question-card.active{display:flex;animation:fadeSlideUp .5s ease-out forwards}\n.q-number{font-size:clamp(11px,1.1vw,14px);text-transform:uppercase;letter-spacing:2px;color:#ef4444;font-weight:600}\n.q-text{font-size:clamp(18px,2.5vw,36px);font-weight:700;line-height:1.3}\n.options{display:grid;grid-template-columns:1fr 1fr;gap:clamp(8px,1.2%,16px)}\n.option{padding:clamp(12px,1.5%,22px) clamp(16px,2%,28px);background:rgba(255,255,255,0.05);border:2px solid rgba(255,255,255,0.1);border-radius:12px;font-size:clamp(13px,1.5vw,20px);color:rgba(255,255,255,0.85);cursor:pointer;transition:all .25s ease;display:flex;align-items:center;gap:10px;user-select:none}\n.option:hover{background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.25);transform:translateY(-2px)}\n.option.correct{background:rgba(34,197,94,0.15);border-color:#22c55e;color:#fff}\n.option.wrong{background:rgba(239,68,68,0.12);border-color:#ef4444;color:rgba(255,255,255,0.6)}\n.option.correct::after{content:'✓';margin-left:auto;color:#22c55e;font-weight:700;font-size:1.2em}\n.option.wrong::after{content:'✗';margin-left:auto;color:#ef4444;font-weight:700;font-size:1.2em}\n.option.disabled{pointer-events:none}\n.opt-letter{width:clamp(24px,2.5vw,36px);height:clamp(24px,2.5vw,36px);border-radius:8px;background:rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:clamp(11px,1.2vw,16px);flex-shrink:0}\n.explanation{font-size:clamp(12px,1.3vw,17px);color:rgba(255,255,255,0.6);padding:12px 16px;border-left:3px solid #22c55e;background:rgba(34,197,94,0.05);border-radius:0 8px 8px 0;display:none;animation:fadeSlideUp .3s ease-out forwards}\n.explanation.show{display:block}\n.nav-btn{padding:10px 24px;border-radius:10px;border:none;font-family:'Inter',sans-serif;font-size:clamp(13px,1.3vw,17px);font-weight:600;cursor:pointer;transition:all .2s ease;display:none;align-self:flex-end;margin-top:8px}\n.nav-btn.show{display:inline-flex}\n.nav-btn.next{background:linear-gradient(135deg,#ef4444,#f97316);color:#fff}\n.nav-btn.next:hover{transform:translateY(-2px);box-shadow:0 4px 20px rgba(239,68,68,0.3)}\n.results{display:none;flex-direction:column;align-items:center;justify-content:center;gap:20px;text-align:center;animation:fadeSlideUp .6s ease-out forwards}\n.results.active{display:flex}\n.results-score{font-size:clamp(48px,7vw,96px);font-weight:800;background:linear-gradient(135deg,#a3e635,#22c55e);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}\n.results-text{font-size:clamp(16px,2vw,28px);color:rgba(255,255,255,0.7)}\n.results-msg{font-size:clamp(20px,3vw,40px);font-weight:700}\n.progress-bar{width:90%;max-width:1400px;height:6px;background:rgba(255,255,255,0.08);border-radius:3px;margin-top:auto;overflow:hidden;opacity:0;animation:fadeSlideUp .4s ease-out .5s forwards}\n.progress-fill{height:100%;background:linear-gradient(90deg,#ef4444,#f97316);border-radius:3px;transition:width .4s ease;width:0}","htmlContent":"<div class='container'>\n  <div class='header'>\n    <h1 class='heading'>Knowledge <span>Quiz</span></h1>\n    <div class='score-display'>Score: <b id='score-num'>0</b> / 4</div>\n  </div>\n  <div class='quiz-area'>\n    <div class='question-card active' id='q1'>\n      <div class='q-number'>Question 1 of 4</div>\n      <div class='q-text'>What is myocarditis?</div>\n      <div class='options'>\n        <div class='option' data-q='1' data-correct='false' onclick='handleAnswer(this)'><span class='opt-letter'>A</span>Blockage of coronary arteries</div>\n        <div class='option' data-q='1' data-correct='true' onclick='handleAnswer(this)'><span class='opt-letter'>B</span>Inflammation of the heart muscle</div>\n        <div class='option' data-q='1' data-correct='false' onclick='handleAnswer(this)'><span class='opt-letter'>C</span>Hardening of heart valves</div>\n        <div class='option' data-q='1' data-correct='false' onclick='handleAnswer(this)'><span class='opt-letter'>D</span>Enlargement of the aorta</div>\n      </div>\n      <div class='explanation' id='exp1'>Myocarditis is inflammation of the myocardium — the muscular middle layer of the heart wall.</div>\n      <button class='nav-btn next' onclick='nextQuestion(2)'>Next →</button>\n    </div>\n    <div class='question-card' id='q2'>\n      <div class='q-number'>Question 2 of 4</div>\n      <div class='q-text'>Which is the most common cause of myocarditis?</div>\n      <div class='options'>\n        <div class='option' data-q='2' data-correct='false' onclick='handleAnswer(this)'><span class='opt-letter'>A</span>Bacterial infection</div>\n        <div class='option' data-q='2' data-correct='false' onclick='handleAnswer(this)'><span class='opt-letter'>B</span>Radiation exposure</div>\n        <div class='option' data-q='2' data-correct='true' onclick='handleAnswer(this)'><span class='opt-letter'>C</span>Viral infection</div>\n        <div class='option' data-q='2' data-correct='false' onclick='handleAnswer(this)'><span class='opt-letter'>D</span>Genetic mutation</div>\n      </div>\n      <div class='explanation' id='exp2'>Viral infections, particularly Coxsackievirus B, are the most common cause of myocarditis worldwide.</div>\n      <button class='nav-btn next' onclick='nextQuestion(3)'>Next →</button>\n    </div>\n    <div class='question-card' id='q3'>\n      <div class='q-number'>Question 3 of 4</div>\n      <div class='q-text'>What is the preferred non-invasive diagnostic method for myocarditis?</div>\n      <div class='options'>\n        <div class='option' data-q='3' data-correct='false' onclick='handleAnswer(this)'><span class='opt-letter'>A</span>Chest X-ray</div>\n        <div class='option' data-q='3' data-correct='false' onclick='handleAnswer(this)'><span class='opt-letter'>B</span>CT scan</div>\n        <div class='option' data-q='3' data-correct='true' onclick='handleAnswer(this)'><span class='opt-letter'>C</span>Cardiac MRI</div>\n        <div class='option' data-q='3' data-correct='false' onclick='handleAnswer(this)'><span class='opt-letter'>D</span>Ultrasound only</div>\n      </div>\n      <div class='explanation' id='exp3'>Cardiac MRI is the gold standard non-invasive imaging method, revealing inflammation, edema, and scarring with high accuracy.</div>\n      <button class='nav-btn next' onclick='nextQuestion(4)'>Next →</button>\n    </div>\n    <div class='question-card' id='q4'>\n      <div class='q-number'>Question 4 of 4</div>\n      <div class='q-text'>What should you avoid doing while recovering from myocarditis?</div>\n      <div class='options'>\n        <div class='option' data-q='4' data-correct='false' onclick='handleAnswer(this)'><span class='opt-letter'>A</span>Taking prescribed medications</div>\n        <div class='option' data-q='4' data-correct='true' onclick='handleAnswer(this)'><span class='opt-letter'>B</span>Strenuous physical exercise</div>\n        <div class='option' data-q='4' data-correct='false' onclick='handleAnswer(this)'><span class='opt-letter'>C</span>Getting follow-up cardiac imaging</div>\n        <div class='option' data-q='4' data-correct='false' onclick='handleAnswer(this)'><span class='opt-letter'>D</span>Drinking water</div>\n      </div>\n      <div class='explanation' id='exp4'>Patients must avoid strenuous exercise for 3–6 months to prevent dangerous arrhythmias and allow the heart muscle to heal.</div>\n      <button class='nav-btn next' onclick='showResults()'>See Results →</button>\n    </div>\n    <div class='results' id='results'>\n      <div class='results-msg'>Quiz Complete!</div>\n      <div class='results-score' id='final-score'>0/4</div>\n      <div class='results-text' id='results-msg'>Great effort! Review the video to strengthen your knowledge.</div>\n    </div>\n  </div>\n  <div class='progress-bar'><div class='progress-fill' id='progress'></div></div>\n</div>","sceneCode":"let score=0;let answered={};\nfunction handleAnswer(el){const q=el.dataset.q;if(answered[q])return;answered[q]=true;const isCorrect=el.dataset.correct==='true';const card=el.closest('.question-card');const options=card.querySelectorAll('.option');options.forEach(o=>{o.classList.add('disabled');if(o.dataset.correct==='true')o.classList.add('correct');else if(o===el&&!isCorrect)o.classList.add('wrong')});if(isCorrect)score++;document.getElementById('score-num').textContent=score;const exp=card.querySelector('.explanation');if(exp)exp.classList.add('show');const btn=card.querySelector('.nav-btn');if(btn)btn.classList.add('show');document.getElementById('progress').style.width=(Object.keys(answered).length/4*100)+'%'}\nfunction nextQuestion(n){document.querySelectorAll('.question-card').forEach(c=>c.classList.remove('active'));const next=document.getElementById('q'+n);if(next)next.classList.add('active')}\nfunction showResults(){document.querySelectorAll('.question-card').forEach(c=>c.classList.remove('active'));const r=document.getElementById('results');r.classList.add('active');document.getElementById('final-score').textContent=score+'/4';const msgs=['Keep learning — review the video and try again!','Good start — you\'re building solid knowledge!','Great work — you understand myocarditis well!','Perfect score — excellent medical knowledge!'];document.getElementById('results-msg').textContent=msgs[score];document.getElementById('progress').style.width='100%'}\nconst state={progress:0};window.__tl.to(state,{progress:1,duration:DURATION,ease:'none',onUpdate:function(){const p=state.progress}},0);"}
  </script>
</body>
</html>
